name: CI Pipeline - TP4

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types:
      - created
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build do projeto
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar o projeto
        run: mvn clean package -DskipTests

      - name: Salvar artefatos de build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 3

  test:
    name: Testes unitários
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Executar testes unitários
        run: mvn test

      - name: Gerar relatório de cobertura (com JaCoCo)
        run: mvn jacoco:report

      - name: Publicar resultado dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultado dos testes
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 3

