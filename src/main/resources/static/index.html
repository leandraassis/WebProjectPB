<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CRUD Products</title>
        <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="bg-light min-vh-100 py-5">
        <div class="container">
            <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                <h1 class="fs-5 fw-semibold mb-0">| Produtos |</h1>
            </div>

            <div class="row g-4 align-items-start">
                <div class="col-12 col-md-4">
                    <div class="card border shadow-sm">
                        <div class="card-body p-4">
                            <p class="text-uppercase text-secondary fw-semibold mb-4" style="font-size:11px;letter-spacing:.08em">Gerenciar</p>

                            <div class="mb-3">
                                <label for="name" class="form-label small fw-medium">Nome</label>
                                <input type="text" id="name" class="form-control form-control-sm" placeholder="Nome do produto" autocomplete="off">
                            </div>

                            <div class="row g-2 mb-3">
                                <div class="col">
                                    <label for="price" class="form-label small fw-medium">Preço</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text text-secondary">R$</span>
                                        <input type="number" id="price" class="form-control" placeholder="0,00" min="0.01" step="0.01">
                                    </div>
                                </div>
                                <div class="col">
                                    <label for="quantity" class="form-label small fw-medium">Quantidade</label>
                                    <input type="number" id="quantity" class="form-control form-control-sm" placeholder="0" min="0">
                                </div>
                            </div>

                            <button id="save" class="btn btn-success btn-sm w-100"
                                    onclick="editingProductId ? updateProduct() : addProduct()">
                                Salvar
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-8">
                    <div class="card border shadow-sm">
                        <div class="card-body p-4">
                            <p class="text-uppercase text-secondary fw-semibold mb-4" style="font-size:11px;letter-spacing:.08em">Lista</p>
                            <ul id="productList" class="list-unstyled d-flex flex-column gap-2 mb-0"></ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
