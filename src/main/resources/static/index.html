<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CRUD Products</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="content">
            <div>
                <h1>PRODUTOS</h1>

                <h2>Gerenciar</h2>
                <div class="inputs">
                    <input type="text" id="name" placeholder="Nome">
                    <input type="number" id="price" placeholder="Preço">
                    <input type="number" id="quantity" placeholder="Quantidade">
                    <button id="save" onclick="editingProductId ? updateProduct() : addProduct()">Salvar</button>
                </div>
            </div>
            <div>
                <h2>Lista</h2>

                <div class="productsUl">
                    <ul id="productList"></ul>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
